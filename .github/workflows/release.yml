name: Release ZIP

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create ZIP
        run: zip -r opencode-loop.zip . -x "*.git*" "node_modules/*"
      - uses: softprops/action-gh-release@v2
        with:
          files: opencode-loop.zip
